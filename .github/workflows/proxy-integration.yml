name: proxy integration

on:
  pull_request:
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-integration.yml"
  push:
    branches:
      - master
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-integration.yml"

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: proxy/go.sum

      - name: Run integration tests
        run: go test -tags=integration ./integration -count=1 -v
