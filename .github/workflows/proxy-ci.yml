name: proxy unit and lint

on:
  pull_request:
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-ci.yml"
  push:
    branches:
      - master
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: proxy/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: proxy
          args: --timeout=5m ./...

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: proxy/go.sum

      - name: Run unit tests
        run: go test -race ./... -count=1
