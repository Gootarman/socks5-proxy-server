<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Пользователь {{ user.username }}</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #060f23; color: #e2e8f0; }
    .container { max-width: 820px; margin: 32px auto; background:#091631; border:1px solid #243b65; padding:20px; border-radius:14px; }
    .row { margin-bottom:10px; }
    code { background:#102349; padding:2px 6px; border-radius:4px; color:#bfdbfe; word-break: break-all; }
    .actions { margin-top:20px; display:flex; gap:10px; }
    button, a { padding:10px 14px; border-radius:10px; border:1px solid #36507b; background:#0a1a3a; color:#dbeafe; text-decoration:none; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ user.username }}</h1>
    <div class="row"><strong>Порт:</strong> <code>{{ user.listen_port }}</code></div>
    <div class="row"><strong>Статус:</strong> {{ 'Активен' if user.is_active else 'Отключен' }}</div>
    <div class="row"><strong>Создан:</strong> {{ user.created_at }}</div>
    <div class="row"><strong>Ссылка:</strong>
      {% if user.proxy_link %}
      <button type="button" class="copy-btn" data-copy="{{ user.proxy_link|e }}">Скопировать ссылку подключения</button>
      {% else %}
      укажите переменную окружения MTG_SECRET
      {% endif %}
    </div>

    <div class="actions">
      <form method="post" action="{{ url_for('toggle_user', user_id=user.id) }}">
        <button type="submit">Переключить статус</button>
      </form>

      <form method="post" action="{{ url_for('delete_user', user_id=user.id) }}" onsubmit="return confirm('Удалить пользователя?')">
        <button type="submit">Удалить</button>
      </form>

      <a href="{{ url_for('index') }}">Назад</a>
    </div>
  </div>
  <script>
    const btn = document.querySelector('.copy-btn');
    if (btn) {
      btn.addEventListener('click', async () => {
        const text = btn.dataset.copy;
        try { await navigator.clipboard.writeText(text); }
        catch (_) {
          const area = document.createElement('textarea'); area.value = text; document.body.appendChild(area); area.select(); document.execCommand('copy'); document.body.removeChild(area);
        }
        const old = btn.textContent; btn.textContent = 'Скопировано'; setTimeout(() => btn.textContent = old, 900);
      });
    }
  </script>
</body>
</html>
