<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Добавить пользователя</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f6f7fb; }
    .container { max-width: 650px; margin: 0 auto; background:#fff; padding:20px; border-radius:10px; }
    label { display:block; margin:12px 0 6px; }
    input { width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; }
    .actions { margin-top:15px; display:flex; gap:10px; }
    button, a { padding:10px 14px; border-radius:8px; text-decoration:none; border:1px solid #ddd; background:#fff; cursor:pointer; color:#111; }
    .error { color:#b91c1c; margin-bottom:12px; }
    .hint { color:#4b5563; font-size:.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Добавление пользователя</h1>
    <p class="hint">Если порт пустой, он будет автоматически выделен из диапазона {{ range_start }}-{{ range_end }}.</p>
    {% if error %}<p class="error">Ошибка: {{ error }}</p>{% endif %}

    <form method="post">
      <label for="username">Username</label>
      <input id="username" name="username" required />

      <label for="listen_port">Порт (необязательно)</label>
      <input id="listen_port" name="listen_port" type="number" min="1" max="65535" />

      <div class="actions">
        <button type="submit">Сохранить</button>
        <a href="{{ url_for('index') }}">Отмена</a>
      </div>
    </form>
  </div>
</body>
</html>
