services:
  mtg:
    image: nineseconds/mtg:2
    command:
      [
        "simple-run",
        "-n",
        "${MTG_FAKE_TLS_HOST}",
        "-i",
        "${MTG_IP_MODE}",
        "0.0.0.0:${MTG_UPSTREAM_PORT}",
        "${MTG_SECRET}"
      ]
    restart: unless-stopped
    expose:
      - "${MTG_UPSTREAM_PORT}"

  gateway:
    build: .
    command:
      [
        "python",
        "gateway.py",
        "--listen-host",
        "0.0.0.0",
        "--upstream-host",
        "mtg",
        "--upstream-port",
        "${MTG_UPSTREAM_PORT}",
        "--poll-interval",
        "${GATEWAY_POLL_INTERVAL}",
        "--client-max-age",
        "${GATEWAY_CLIENT_MAX_AGE:-0}",
        "--enforce-interval",
        "${GATEWAY_ENFORCE_INTERVAL:-5}"
      ]
    environment:
      DB_PATH: /app/users.db
    volumes:
      - ./users.db:/app/users.db
    ports:
      - "${PORT_RANGE_START}-${PORT_RANGE_END}:${PORT_RANGE_START}-${PORT_RANGE_END}"
    depends_on:
      - mtg
    restart: unless-stopped

  admin:
    build: .
    command: ["python", "admin_panel.py"]
    environment:
      DB_PATH: /app/users.db
      PUBLIC_HOST: ${PUBLIC_HOST}
      MTG_SECRET: ${MTG_SECRET}
      PORT_RANGE_START: ${PORT_RANGE_START}
      PORT_RANGE_END: ${PORT_RANGE_END}
      ADMIN_PORT: 8000
    volumes:
      - ./users.db:/app/users.db
    ports:
      - "${ADMIN_PORT}:8000"
    depends_on:
      - gateway
    restart: unless-stopped

