  go_proxy:
    depends_on:
      - redis
    build: ./go-proxy
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REQUIRE_AUTH: ${REQUIRE_AUTH}
      AUTH_CACHE_MAX_SIZE: ${AUTH_CACHE_MAX_SIZE}
      AUTH_CACHE_TTL: ${AUTH_CACHE_TTL}
      REDIS_AUTH_UPDATES_QUEUE_SIZE: ${REDIS_AUTH_UPDATES_QUEUE_SIZE}
      REDIS_USAGE_UPDATES_QUEUE_SIZE: ${REDIS_USAGE_UPDATES_QUEUE_SIZE}
      TELEGRAM_API_TOKEN: ${TELEGRAM_API_TOKEN}
    ports:
      - "${APP_PORT}:8000"
    expose:
      - "${APP_PORT}/tcp"
    restart: always

